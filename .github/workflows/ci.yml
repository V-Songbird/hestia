name: CI

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pytest
        run: pip install pytest

      - name: Run test suite
        run: pytest tests/ -v
